# Smoke Test Template
# Adapt this to your project's API. Replace placeholder URLs and secrets.
#
# Setup:
# 1. Copy this file to .github/workflows/smoke-test.yml
# 2. Replace API_BASE_URL with your production API URL
# 3. Add secrets in GitHub: Settings → Secrets → Actions
# 4. Update the test steps to hit your critical endpoints

name: Smoke Test

on:
  push:
    branches: [main]

jobs:
  smoke-test:
    name: API smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Test critical endpoint
        id: health_check
        env:
          API_BASE_URL: "https://your-api.example.com"  # ← CHANGE THIS
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            "${API_BASE_URL}/api/health")
          STATUS=$(echo "$RESPONSE" | tail -n 1)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed"

      # Add more steps for your critical paths:
      # - Cart/checkout flow
      # - Authentication
      # - Key API endpoints
      #
      # Example:
      # - name: Test checkout flow
      #   run: |
      #     # POST to create cart, validate response, etc.

      - name: Notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}  # ← ADD THIS SECRET
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "No Slack webhook configured, skipping notification"
            exit 0
          fi
          PAYLOAD=$(jq -n \
            --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{text: ":rotating_light: *Smoke test FAILED* after merge to main\nRun: \($url)"}')
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
